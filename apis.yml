name: APIs.io Developer Portal
description: Static JSON feeds for the APIs.io network — providers, APIs, capabilities, tags, schemas, AsyncAPI specs, JSON-LD contexts, rules, and vocabularies.
url: https://developer.apis.io/apis.json
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
created: "2023-07-26"
modified: "2026-05-02"
specificationVersion: "0.20"
tags:
  - APIs
  - Search Engine
  - Discovery
  - JSON Feeds
  - API Catalog
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
    url: https://kinlane.com
apis:

  - name: Providers Feed
    description: Static JSON feed of all API providers indexed by APIs.io. Each record includes provider name, description, tags, API count, and capability count.
    humanURL: https://developer.apis.io/feeds/providers/
    baseURL: https://providers.apis.io
    tags:
      - Providers
      - Discovery
    properties:
      - type: Documentation
        url: https://developer.apis.io/feeds/providers/
      - type: JSONFeed
        url: https://providers.apis.io/search-index.json
      - type: APICatalog
        url: https://providers.apis.io/.well-known/api-catalog

