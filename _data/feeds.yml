- slug: providers
  name: Providers
  description: Organizations and companies that publish APIs indexed by APIs.io. Each provider record includes name, description, tags, and a count of their associated APIs and capabilities.
  url: https://providers.apis.io/
  feed_url: https://providers.apis.io/search-index.json
  catalog_url: https://providers.apis.io/.well-known/api-catalog
  tags:
    - Providers
    - Discovery
  fields:
    - name: i
      type: integer
      description: Sequential index position
    - name: type
      type: string
      description: Always "provider"
    - name: n
      type: string
      description: Provider name
    - name: d
      type: string
      description: Provider description (truncated to 300 chars)
    - name: t
      type: array
      description: Tags
    - name: u
      type: string
      description: Provider page URL on providers.apis.io
    - name: ac
      type: integer
      description: Number of APIs indexed for this provider
    - name: cc
      type: integer
      description: Number of capabilities published by this provider

- slug: apis
